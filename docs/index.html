<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>股票法人買賣超紀錄</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; }
    h1 { font-size: 24px; }
    select { padding: 5px; margin-bottom: 20px; }
    table { border-collapse: collapse; width: 100%; margin-top: 10px; }
    th, td { border: 1px solid #ccc; padding: 8px; text-align: right; }
    th { background-color: #f2f2f2; }
    td.name { text-align: left; }
    .pos { color: red; font-weight: bold; }
    .neg { color: green; font-weight: bold; }
  </style>
</head>
<body>
  <h1>股票法人買賣超紀錄</h1>
  <label for="stockSelect">選擇股票：</label>
  <select id="stockSelect"></select>
  
  <table id="dataTable">
    <thead>
      <tr>
        <th>日期</th>
        <th>外資</th>
        <th>投信</th>
        <th>自營商</th>
        <th>三大法人合計</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <script>
    let stockData = {};

    async function loadData() {
      const response = await fetch("docs/data.json");
      stockData = await response.json();

      const select = document.getElementById("stockSelect");

      // 建立下拉選單（股票代號 + 名稱）
      Object.keys(stockData).forEach(stockId => {
        const name = stockData[stockId][0].name;
        const option = document.createElement("option");
        option.value = stockId;
        option.textContent = `${stockId} ${name}`;
        select.appendChild(option);
      });

      // 預設選第一檔
      renderTable(select.value);

      // 綁定選擇事件
      select.addEventListener("change", () => renderTable(select.value));
    }

    function renderTable(stockId) {
      const tbody = document.querySelector("#dataTable tbody");
      tbody.innerHTML = "";

      if (!stockData[stockId]) return;

      // 日期由新到舊排序，取前 20 筆
      const sorted = stockData[stockId]
        .sort((a, b) => b.date.localeCompare(a.date))
        .slice(0, 20);

      sorted.forEach(item => {
        const row = document.createElement("tr");
        row.innerHTML = `
          <td>${item.date}</td>
          <td class="${item.foreign >= 0 ? 'pos' : 'neg'}">${item.foreign}</td>
          <td class="${item.trust >= 0 ? 'pos' : 'neg'}">${item.trust}</td>
          <td class="${item.dealer >= 0 ? 'pos' : 'neg'}">${item.dealer}</td>
          <td class="${item.total >= 0 ? 'pos' : 'neg'}">${item.total}</td>
        `;
        tbody.appendChild(row);
      });
    }

    loadData();
  </script>
</body>
</html>
