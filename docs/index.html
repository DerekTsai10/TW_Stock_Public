<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>股票法人買賣超紀錄</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; }
    h1 { font-size: 22px; }
    select, input { padding: 5px; margin: 5px; }
    .container { display: flex; gap: 20px; }
    table { border-collapse: collapse; width: 60%; margin-top: 20px; }
    th, td { border: 1px solid #ccc; padding: 6px; text-align: center; }
    th { background: #f5f5f5; }
    .positive { color: red; }
    .negative { color: green; }
    .chart-container { width: 40%; }

    /* 自動完成樣式 */
    #suggestions {
      border: 1px solid #ccc;
      max-height: 150px;
      overflow-y: auto;
      position: absolute;
      background: white;
      z-index: 1000;
      width: 250px;
      display: none;
    }
    #suggestions div {
      padding: 5px;
      cursor: pointer;
    }
    #suggestions div:hover {
      background: #eee;
    }
  </style>
</head>
<body>
  <h1 id="title">股票法人買賣超紀錄</h1>

  <label for="stockSelect">選擇股票：</label>
  <select id="stockSelect"></select>

  <label for="stockInput">輸入股票代碼或名稱：</label>
  <input type="text" id="stockInput" placeholder="例如: 2330 或 台積電">
  <div id="suggestions"></div>

  <div class="container">
    <table id="dataTable">
      <thead>
        <tr>
          <th>日期</th>
          <th>外資 (張)</th>
          <th>投信 (張)</th>
          <th>自營商 (張)</th>
          <th>三大法人合計 (張)</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>

    <div class="chart-container">
      <canvas id="epsChart"></canvas>
    </div>
  </div>

  <script>
    let stockData = {};
    let stockNames = {};
    let epsData = {};
    let epsChart;

    async function loadData() {
      const timestamp = new Date().getTime(); // 避免快取
      const [stockRes, epsRes] = await Promise.all([
        fetch("data.json?t=" + timestamp),
        fetch("eps.json?t=" + timestamp)
      ]);
      stockData = await stockRes.json();
      epsData = await epsRes.json();

      const select = document.getElementById("stockSelect");

      // 建立下拉選單
      Object.keys(stockData).sort().forEach(code => {
        const dates = Object.keys(stockData[code]);
        const sample = stockData[code][dates[0]];
        let name = sample.name || code;
        stockNames[code] = name;

        const option = document.createElement("option");
        option.value = code;
        option.textContent = `${name} (${code})`;
        select.appendChild(option);
      });

      if (Object.keys(stockData).length > 0) {
        updateView(Object.keys(stockData)[0]);
      }
    }

    function updateView(code) {
      updateTable(code);
      updateChart(code);
    }

    function updateTable(code) {
      const title = document.getElementById("title");
      title.textContent = `${stockNames[code] || ""} (${code}) - 最近法人買賣超`;

      const tbody = document.getElementById("dataTable").querySelector("tbody");
      tbody.innerHTML = "";

      const entries = Object.entries(stockData[code]);
      entries.sort((a, b) => b[0].localeCompare(a[0])); // 日期新到舊

      entries.forEach(([date, values]) => {
        const row = document.createElement("tr");

        // 轉換成張數 (四捨五入)
        const foreign = Math.round(values.foreign / 1000);
        const trust   = Math.round(values.trust / 1000);
        const dealer  = Math.round(values.dealer / 1000);
        const total   = foreign + trust + dealer;

        const cells = [date, foreign, trust, dealer, total];

        cells.forEach((val, idx) => {
          const td = document.createElement("td");
          td.textContent = val;
          if (idx > 0) {
            if (val > 0) td.classList.add("positive");
            else if (val < 0) td.classList.add("negative");
          }
          row.appendChild(td);
        });
        tbody.appendChild(row);
      });
    }

    function updateChart(code) {
      const ctx = document.getElementById("epsChart").getContext("2d");

      if (!epsData[code]) {
        if (epsChart) epsChart.destroy();
        return;
      }

      // EPS 依時間排序（舊 → 新）
      const sorted = epsData[code].sort((a, b) => a.date.localeCompare(b.date));
      const labels = sorted.map(d => d.date);
      const values = sorted.map(d => d.eps);

      if (epsChart) epsChart.destroy();

      epsChart = new Chart(ctx, {
        type: "line",
        data: {
          labels: labels,
          datasets: [{
            label: "EPS",
            data: values,
            borderWidth: 2,
            fill: false,
            borderColor: "blue",
            tension: 0.1
          }]
        },
        options: {
          responsive: true,
          plugins: {
            legend: { display: false },
            title: { display: true, text: "近五年 EPS" }
          },
          scales: {
            x: { title: { display: true, text: "季度" } },
            y: { title: { display: true, text: "EPS" } }
          }
        }
      });
    }

    // 下拉選單事件
    document.getElementById("stockSelect").addEventListener("change", (e) => {
      updateView(e.target.value);
    });

    // 輸入框 + 自動完成
    const input = document.getElementById("stockInput");
    const suggestions = document.getElementById("suggestions");

    input.addEventListener("input", () => {
      const query = input.value.trim();
      suggestions.innerHTML = "";

      if (!query) {
        suggestions.style.display = "none";
        return;
      }

      const matches = Object.keys(stockNames).filter(code =>
        code.includes(query) || stockNames[code].includes(query)
      );

      if (matches.length === 0) {
        suggestions.style.display = "none";
        return;
      }

      matches.forEach(code => {
        const div = document.createElement("div");
        div.textContent = `${stockNames[code]} (${code})`;
        div.onclick = () => {
          input.value = stockNames[code];
          updateView(code);
          suggestions.style.display = "none";
        };
        suggestions.appendChild(div);
      });

      suggestions.style.display = "block";
    });

    // Enter 鍵查詢
    input.addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        const query = input.value.trim();
        if (!query) return;

        if (stockData[query]) {
          updateView(query);
          return;
        }

        const found = Object.keys(stockNames).find(code =>
          code.includes(query) || stockNames[code].includes(query)
        );

        if (found) {
          updateView(found);
          suggestions.style.display = "none";
        } else {
          alert("查無此股票");
        }
      }
    });

    loadData();
  </script>
</body>
</html>
