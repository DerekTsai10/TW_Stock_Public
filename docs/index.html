<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>股票法人買賣超紀錄</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; }
    h1 { font-size: 24px; }
    h2 { font-size: 20px; margin-top: 30px; }
    select, input { padding: 5px; margin-bottom: 20px; }
    table { border-collapse: collapse; width: 100%; margin-top: 10px; }
    th, td { border: 1px solid #ccc; padding: 8px; text-align: center; }
    .highlight { background: #f0f8ff; }
    .section { margin-bottom: 40px; }
  </style>
</head>
<body>
  <h1>股票法人買賣超紀錄</h1>

  <!-- 新上榜區塊 -->
  <div class="section" id="newcomers-section">
    <h2>【新上榜】投信/外資買超前15 (與過去10個交易日相比)</h2>
    <p id="newcomers-date"></p>
    <ul id="newcomers-list"></ul>
  </div>

  <!-- EPS 區塊 -->
  <div class="section" id="eps-section">
    <h2>每季 EPS</h2>
    <p>（僅支援已收錄的股票，例如台積電 2330、台燿 6247）</p>
    <div id="eps-container"></div>
  </div>

  <!-- 主選擇區塊 -->
  <div class="section">
    <h2>法人買賣超紀錄</h2>
    <input type="text" id="searchInput" placeholder="輸入股票代號或名稱搜尋" />
    <select id="stockSelect"></select>
    <table id="dataTable">
      <thead>
        <tr>
          <th>日期</th>
          <th>外資</th>
          <th>投信</th>
          <th>自營商</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

  <script>
    let stockData = {};
    let epsData = {};

    // 載入法人買賣超資料
    async function loadData() {
      const res = await fetch('data.json');
      stockData = await res.json();
      populateSelect();
    }

    // 載入 EPS 資料
    async function loadEPS() {
      const res = await fetch('eps.json');
      epsData = await res.json();
    }

    // 載入新上榜資料
    async function loadNewcomers() {
      try {
        const res = await fetch('docs/newcomers.json');
        const newcomersData = await res.json();
        document.getElementById('newcomers-date').textContent = `日期：${newcomersData.date}`;
        const list = document.getElementById('newcomers-list');
        list.innerHTML = '';
        if (newcomersData.newcomers.length > 0) {
          newcomersData.newcomers.forEach(item => {
            const li = document.createElement('li');
            li.textContent = `${item.stock_id} ${item.name}`;
            list.appendChild(li);
          });
        } else {
          const li = document.createElement('li');
          li.textContent = '今日無新上榜股票';
          list.appendChild(li);
        }
      } catch (e) {
        console.log("⚠️ 無法載入 newcomers.json");
      }
    }

    // 產生下拉選單
    function populateSelect() {
      const select = document.getElementById('stockSelect');
      select.innerHTML = '';
      Object.keys(stockData).forEach(stockId => {
        const option = document.createElement('option');
        option.value = stockId;
        option.textContent = `${stockId} ${stockData[stockId].name}`;
        select.appendChild(option);
      });
    }

    // 顯示法人買賣超表格
    function showData(stockId) {
      const tbody = document.querySelector('#dataTable tbody');
      tbody.innerHTML = '';
      const records = stockData[stockId].records;
      records.forEach(r => {
        const row = `<tr>
          <td>${r.date}</td>
          <td>${r.foreign}</td>
          <td>${r.trust}</td>
          <td>${r.dealer}</td>
        </tr>`;
        tbody.insertAdjacentHTML('beforeend', row);
      });

      // EPS 顯示
      const epsContainer = document.getElementById('eps-container');
      epsContainer.innerHTML = '';
      if (epsData[stockId]) {
        const epsList = epsData[stockId];
        const table = document.createElement('table');
        const header = `<tr><th>年度/季</th><th>EPS</th></tr>`;
        table.innerHTML = header;
        epsList.forEach(e => {
          const row = `<tr><td>${e.period}</td><td>${e.value}</td></tr>`;
          table.insertAdjacentHTML('beforeend', row);
        });
        epsContainer.appendChild(table);
      }
    }

    // 搜尋輸入
    document.getElementById('searchInput').addEventListener('keyup', function(e) {
      if (e.key === 'Enter') {
        const keyword = this.value.trim();
        const stockId = Object.keys(stockData).find(id =>
          id.includes(keyword) || stockData[id].name.includes(keyword)
        );
        if (stockId) {
          document.getElementById('stockSelect').value = stockId;
          showData(stockId);
        }
      }
    });

    // 下拉選單事件
    document.getElementById('stockSelect').addEventListener('change', function() {
      showData(this.value);
    });

    // 初始化
    loadData().then(() => {
      const firstStockId = Object.keys(stockData)[0];
      if (firstStockId) {
        document.getElementById('stockSelect').value = firstStockId;
        showData(firstStockId);
      }
    });
    loadEPS();
    loadNewcomers();
  </script>
</body>
</html>
